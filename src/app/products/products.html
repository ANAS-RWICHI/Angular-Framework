<div class="p-3">
  <div class="card-body">
    <table class="table">
      <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Name</th>
        <th scope="col">Price</th>
        <th scope="col">Selected</th>
      </tr>
      </thead>
      <tbody>
        @for (product of products; track product.id) {
          <tr>
            <td>{{product.id}}</td>
            <td>{{product.name}}</td>
            <td>{{product.price}}</td>
            <td>@if (product.selected){<i class="bi bi-check-circle"></i>}
              </td>
            <td><button (click)="handelDelete(product.id)" class="btn btn-outline-danger">
              <i class="bi bi-trash"></i>
            </button></td>
          </tr>
        }

      </tbody>
    </table>
  </div>
</div>
